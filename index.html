<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BazaarAI — AI-Powered Shopping</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f9f9f7;
      --bg2: #ffffff;
      --bg3: #f1f0ec;
      --text: #1a1a18;
      --text2: #6b6b67;
      --border: rgba(0,0,0,0.1);
      --border2: rgba(0,0,0,0.18);
      --purple: #534AB7;
      --purple-dark: #3C3489;
      --purple-light: #EEEDFE;
      --purple-text: #26215C;
      --success-bg: #EAF3DE;
      --success-text: #3B6D11;
      --success-border: rgba(59,109,17,0.25);
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1a1a18;
        --bg2: #242422;
        --bg3: #2c2c2a;
        --text: #e8e6dc;
        --text2: #9c9a90;
        --border: rgba(255,255,255,0.1);
        --border2: rgba(255,255,255,0.18);
        --purple-light: #2a2660;
        --purple-text: #AFA9EC;
        --success-bg: #173404;
        --success-text: #97C459;
        --success-border: rgba(99,153,34,0.3);
      }
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* NAVBAR */
    .navbar {
      background: var(--bg2);
      border-bottom: 0.5px solid var(--border);
      padding: 0 1.5rem;
      height: 58px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .logo {
      font-size: 18px;
      font-weight: 600;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 8px;
      text-decoration: none;
    }
    .logo i { color: var(--purple); font-size: 22px; }
    .search-bar {
      display: flex;
      align-items: center;
      background: var(--bg3);
      border: 0.5px solid var(--border);
      border-radius: 10px;
      padding: 7px 14px;
      gap: 8px;
      flex: 1;
      max-width: 320px;
      margin: 0 1rem;
    }
    .search-bar input {
      border: none;
      background: transparent;
      font-size: 14px;
      color: var(--text);
      outline: none;
      width: 100%;
    }
    .search-bar input::placeholder { color: var(--text2); }
    .search-bar i { color: var(--text2); font-size: 17px; }
    .nav-right { display: flex; align-items: center; gap: 6px; }
    .icon-btn {
      background: none;
      border: 0.5px solid var(--border2);
      border-radius: 10px;
      width: 38px; height: 38px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      color: var(--text);
      position: relative;
      font-size: 18px;
      transition: background 0.15s;
    }
    .icon-btn:hover { background: var(--bg3); }
    .badge {
      position: absolute; top: -5px; right: -5px;
      background: var(--purple);
      color: #fff;
      border-radius: 50%;
      width: 17px; height: 17px;
      font-size: 10px;
      display: flex; align-items: center; justify-content: center;
      font-weight: 600;
    }

    /* TABS */
    .tabs {
      background: var(--bg2);
      border-bottom: 0.5px solid var(--border);
      display: flex;
      padding: 0 1.5rem;
      overflow-x: auto;
    }
    .tab-btn {
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      padding: 13px 16px;
      font-size: 14px;
      cursor: pointer;
      color: var(--text2);
      display: flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
      transition: color 0.15s;
    }
    .tab-btn.active { border-bottom-color: var(--purple); color: var(--purple); font-weight: 500; }
    .tab-btn:hover:not(.active) { color: var(--text); }

    /* PAGES */
    .page { display: none; }
    .page.active { display: block; }

    /* HERO */
    .hero {
      background: var(--purple-light);
      padding: 2rem 1.5rem;
      text-align: center;
      border-bottom: 0.5px solid var(--border);
    }
    .hero h1 { font-size: 22px; font-weight: 600; color: var(--purple-text); margin-bottom: 6px; }
    .hero p { font-size: 14px; color: var(--purple); }

    /* FILTERS */
    .filter-row {
      padding: 12px 1.5rem;
      display: flex;
      gap: 8px;
      overflow-x: auto;
      background: var(--bg);
    }
    .filter-chip {
      background: var(--bg2);
      border: 0.5px solid var(--border2);
      border-radius: 20px;
      padding: 5px 14px;
      font-size: 13px;
      cursor: pointer;
      white-space: nowrap;
      color: var(--text2);
      transition: all 0.15s;
    }
    .filter-chip.active {
      background: var(--purple-light);
      border-color: var(--purple);
      color: var(--purple-text);
      font-weight: 500;
    }

    /* PRODUCTS GRID */
    .products-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 12px;
      padding: 1rem 1.5rem 2rem;
    }
    .product-card {
      background: var(--bg2);
      border: 0.5px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
      cursor: pointer;
      transition: border-color 0.15s, transform 0.1s;
    }
    .product-card:hover { border-color: var(--border2); transform: translateY(-1px); }
    .product-img {
      width: 100%;
      aspect-ratio: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 48px;
      background: var(--bg3);
    }
    .product-info { padding: 12px; }
    .product-name { font-size: 13px; font-weight: 500; color: var(--text); margin-bottom: 4px; line-height: 1.4; }
    .product-price { font-size: 16px; font-weight: 600; color: var(--purple); margin-bottom: 5px; }
    .product-rating { font-size: 12px; color: var(--text2); margin-bottom: 10px; display: flex; align-items: center; gap: 4px; }
    .product-rating i { color: #BA7517; font-size: 13px; }
    .add-btn {
      width: 100%;
      background: var(--purple);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 8px;
      font-size: 13px;
      cursor: pointer;
      font-weight: 500;
      transition: background 0.15s;
    }
    .add-btn:hover { background: var(--purple-dark); }
    .added-btn {
      width: 100%;
      background: var(--success-bg);
      color: var(--success-text);
      border: 0.5px solid var(--success-border);
      border-radius: 8px;
      padding: 8px;
      font-size: 13px;
      cursor: pointer;
      font-weight: 500;
    }
    .empty-state { grid-column: 1/-1; text-align: center; padding: 3rem; color: var(--text2); }
    .empty-state i { font-size: 40px; display: block; margin-bottom: 10px; }

    /* CART */
    .cart-container { padding: 1.5rem; max-width: 540px; margin: 0 auto; }
    .cart-empty { text-align: center; padding: 4rem 2rem; color: var(--text2); }
    .cart-empty i { font-size: 52px; display: block; margin-bottom: 12px; opacity: 0.5; }
    .cart-item {
      background: var(--bg2);
      border: 0.5px solid var(--border);
      border-radius: 14px;
      padding: 1rem;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .cart-item-emoji {
      font-size: 28px;
      width: 48px; height: 48px;
      display: flex; align-items: center; justify-content: center;
      background: var(--bg3);
      border-radius: 10px;
      flex-shrink: 0;
    }
    .cart-item-details { flex: 1; }
    .cart-item-name { font-size: 14px; font-weight: 500; margin-bottom: 4px; }
    .cart-item-price { font-size: 14px; color: var(--purple); font-weight: 600; }
    .qty-ctrl { display: flex; align-items: center; gap: 8px; margin-top: 6px; }
    .qty-btn {
      background: var(--bg3);
      border: 0.5px solid var(--border);
      border-radius: 6px;
      width: 26px; height: 26px;
      font-size: 16px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      color: var(--text);
    }
    .qty-btn:hover { background: var(--border); }
    .qty-num { font-size: 14px; font-weight: 500; min-width: 20px; text-align: center; }
    .remove-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text2);
      font-size: 18px;
      padding: 6px;
      border-radius: 8px;
      transition: color 0.15s;
    }
    .remove-btn:hover { color: #A32D2D; background: #FCEBEB; }
    .cart-total {
      background: var(--bg2);
      border: 0.5px solid var(--border);
      border-radius: 14px;
      padding: 1.25rem;
      margin-top: 1rem;
    }
    .total-row { display: flex; justify-content: space-between; font-size: 14px; padding: 5px 0; color: var(--text2); }
    .total-row.final { font-weight: 600; font-size: 16px; color: var(--text); border-top: 0.5px solid var(--border); margin-top: 10px; padding-top: 14px; }
    .checkout-btn {
      width: 100%;
      background: var(--purple);
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 13px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 14px;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      transition: background 0.15s;
    }
    .checkout-btn:hover { background: var(--purple-dark); }
    .free-delivery { color: var(--success-text); font-size: 12px; }

    /* AUTH */
    .auth-container { max-width: 380px; margin: 2rem auto; padding: 0 1.5rem; }
    .auth-card {
      background: var(--bg2);
      border: 0.5px solid var(--border);
      border-radius: 16px;
      padding: 2rem;
    }
    .auth-card h2 { font-size: 20px; font-weight: 600; margin-bottom: 6px; }
    .auth-card p { font-size: 13px; color: var(--text2); margin-bottom: 1.5rem; }
    .form-group { margin-bottom: 1rem; }
    .form-group label { display: block; font-size: 13px; color: var(--text2); margin-bottom: 6px; font-weight: 500; }
    .form-group input {
      width: 100%;
      padding: 10px 12px;
      border: 0.5px solid var(--border2);
      border-radius: 10px;
      font-size: 14px;
      background: var(--bg);
      color: var(--text);
      outline: none;
      transition: border-color 0.15s;
    }
    .form-group input:focus { border-color: var(--purple); }
    .auth-btn {
      width: 100%;
      background: var(--purple);
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 11px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 6px;
      transition: background 0.15s;
    }
    .auth-btn:hover { background: var(--purple-dark); }
    .auth-note { text-align: center; margin-top: 12px; font-size: 12px; color: var(--text2); }
    .logged-in-card {
      background: var(--bg2);
      border: 0.5px solid var(--border);
      border-radius: 16px;
      padding: 2rem;
      text-align: center;
    }
    .avatar {
      width: 64px; height: 64px;
      border-radius: 50%;
      background: var(--purple-light);
      display: flex; align-items: center; justify-content: center;
      font-size: 24px; font-weight: 600; color: var(--purple);
      margin: 0 auto 1rem;
    }
    .logout-btn {
      background: none;
      border: 0.5px solid var(--border2);
      border-radius: 10px;
      padding: 9px 20px;
      cursor: pointer;
      font-size: 14px;
      color: var(--text2);
      margin-top: 1rem;
      display: inline-flex; align-items: center; gap: 6px;
      transition: background 0.15s;
    }
    .logout-btn:hover { background: var(--bg3); }

    /* AI PAGE */
    .ai-container { padding: 1.5rem; }
    .ai-header { margin-bottom: 1.25rem; }
    .ai-header h3 { font-size: 18px; font-weight: 600; margin-bottom: 4px; }
    .ai-header p { font-size: 13px; color: var(--text2); }
    .get-recs-btn {
      background: var(--purple);
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 11px 22px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      display: inline-flex; align-items: center; gap: 8px;
      margin-bottom: 1.5rem;
      transition: background 0.15s;
    }
    .get-recs-btn:hover { background: var(--purple-dark); }
    .ai-loading { text-align: center; padding: 3rem; color: var(--text2); }
    .ai-loading i { font-size: 40px; color: var(--purple); display: block; margin-bottom: 12px; }
    .ai-recs { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 12px; }
    .ai-rec-card {
      background: var(--bg2);
      border: 0.5px solid var(--border);
      border-radius: 14px;
      padding: 1.1rem;
    }
    .rec-badge {
      background: var(--purple-light);
      color: var(--purple-text);
      font-size: 11px;
      padding: 3px 9px;
      border-radius: 20px;
      display: inline-flex; align-items: center; gap: 4px;
      margin-bottom: 10px;
      font-weight: 500;
    }
    .rec-emoji { font-size: 32px; margin-bottom: 10px; }
    .rec-name { font-size: 14px; font-weight: 600; margin-bottom: 5px; }
    .rec-reason { font-size: 12px; color: var(--text2); margin-bottom: 10px; line-height: 1.5; }
    .rec-price { font-size: 15px; font-weight: 600; color: var(--purple); margin-bottom: 10px; }
    .ai-add-btn {
      width: 100%;
      background: none;
      border: 0.5px solid var(--purple);
      border-radius: 8px;
      padding: 8px;
      font-size: 13px;
      cursor: pointer;
      color: var(--purple);
      font-weight: 500;
      transition: background 0.15s;
    }
    .ai-add-btn:hover { background: var(--purple-light); }

    /* TOAST */
    .toast {
      position: fixed; bottom: 1.5rem; right: 1.5rem;
      background: var(--bg2);
      border: 0.5px solid var(--border2);
      border-radius: 12px;
      padding: 12px 18px;
      font-size: 14px;
      font-weight: 500;
      display: none;
      z-index: 9999;
      align-items: center;
      gap: 8px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.12);
      max-width: 300px;
    }
    .toast.show { display: flex; animation: slideIn 0.2s ease; }
    .toast i { color: var(--success-text); font-size: 18px; }
    @keyframes slideIn { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }

    /* ORDER SUCCESS */
    .order-success {
      text-align: center;
      padding: 3rem 1.5rem;
      max-width: 400px;
      margin: 0 auto;
    }
    .order-success i { font-size: 60px; color: var(--success-text); display: block; margin-bottom: 1rem; }
    .order-success h2 { font-size: 22px; font-weight: 600; margin-bottom: 8px; }
    .order-success p { color: var(--text2); font-size: 14px; }
    .continue-btn {
      background: var(--purple);
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 11px 28px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 1.5rem;
      transition: background 0.15s;
    }
    .continue-btn:hover { background: var(--purple-dark); }
  </style>
</head>
<body>

<nav class="navbar">
  <a class="logo" href="#">
    <i class="ti ti-shopping-bag"></i>
    BazaarAI
  </a>
  <div class="search-bar">
    <i class="ti ti-search"></i>
    <input type="text" id="search-input" placeholder="Products search karein..." oninput="filterProducts()" />
  </div>
  <div class="nav-right">
    <button class="icon-btn" onclick="showTab('cart')" title="Cart">
      <i class="ti ti-shopping-cart"></i>
      <span class="badge" id="cart-badge" style="display:none">0</span>
    </button>
    <button class="icon-btn" onclick="showTab('login')" id="user-btn" title="Account">
      <i class="ti ti-user"></i>
    </button>
  </div>
</nav>

<div class="tabs">
  <button class="tab-btn active" id="tab-products" onclick="showTab('products')">
    <i class="ti ti-grid-dots"></i> Products
  </button>
  <button class="tab-btn" id="tab-ai" onclick="showTab('ai')">
    <i class="ti ti-sparkles"></i> AI Picks
  </button>
  <button class="tab-btn" id="tab-cart" onclick="showTab('cart')">
    <i class="ti ti-shopping-cart"></i> Cart
  </button>
  <button class="tab-btn" id="tab-login" onclick="showTab('login')">
    <i class="ti ti-user"></i> Account
  </button>
</div>

<!-- PRODUCTS PAGE -->
<div id="page-products" class="page active">
  <div class="hero">
    <h1>🛍️ BazaarAI pe aapka swagat hai</h1>
    <p>AI-powered smart shopping experience</p>
  </div>
  <div class="filter-row" id="filter-row"></div>
  <div class="products-grid" id="products-grid"></div>
</div>

<!-- AI PICKS PAGE -->
<div id="page-ai" class="page">
  <div class="ai-container">
    <div class="ai-header">
      <h3>✨ AI Product Recommendations</h3>
      <p>Aapki cart aur pasand ke hisaab se AI smart suggestions deta hai</p>
    </div>
    <button class="get-recs-btn" onclick="getAIRecs()">
      <i class="ti ti-sparkles"></i> AI se recommendations lo
    </button>
    <div id="ai-recs-container"></div>
  </div>
</div>

<!-- CART PAGE -->
<div id="page-cart" class="page">
  <div class="cart-container" id="cart-container"></div>
</div>

<!-- LOGIN PAGE -->
<div id="page-login" class="page">
  <div class="auth-container" id="auth-container"></div>
</div>

<!-- TOAST -->
<div class="toast" id="toast">
  <i class="ti ti-check"></i>
  <span id="toast-msg"></span>
</div>

<script>
  const ANTHROPIC_API_KEY ="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"; // apni API key yahan daalo

  const products = [
    { id:1, name:"Wireless Earbuds", price:1299, emoji:"🎧", rating:4.5, reviews:128, category:"Electronics" },
    { id:2, name:"Running Shoes", price:2499, emoji:"👟", rating:4.3, reviews:89, category:"Fashion" },
    { id:3, name:"Face Moisturizer", price:499, emoji:"🧴", rating:4.6, reviews:312, category:"Beauty" },
    { id:4, name:"Python Book", price:699, emoji:"📚", rating:4.8, reviews:204, category:"Books" },
    { id:5, name:"Yoga Mat", price:899, emoji:"🧘", rating:4.4, reviews:67, category:"Sports" },
    { id:6, name:"Smart Watch", price:4999, emoji:"⌚", rating:4.2, reviews:155, category:"Electronics" },
    { id:7, name:"Coffee Maker", price:1899, emoji:"☕", rating:4.7, reviews:93, category:"Home" },
    { id:8, name:"Sunglasses", price:799, emoji:"🕶️", rating:4.1, reviews:44, category:"Fashion" },
    { id:9, name:"Protein Powder", price:1499, emoji:"💪", rating:4.3, reviews:187, category:"Sports" },
    { id:10, name:"Desk Lamp", price:649, emoji:"💡", rating:4.5, reviews:73, category:"Home" },
    { id:11, name:"Lipstick Set", price:349, emoji:"💄", rating:4.4, reviews:221, category:"Beauty" },
    { id:12, name:"Novel — Ponniyin Selvan", price:599, emoji:"📖", rating:4.9, reviews:456, category:"Books" },
  ];

  let cart = [];
  let user = null;
  let activeFilter = "All";
  const categories = ["All", ...new Set(products.map(p => p.category))];

  function showToast(msg) {
    const t = document.getElementById("toast");
    document.getElementById("toast-msg").textContent = msg;
    t.className = "toast show";
    setTimeout(() => t.className = "toast", 2500);
  }

  function showTab(name) {
    document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
    document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
    document.getElementById("page-" + name).classList.add("active");
    document.getElementById("tab-" + name).classList.add("active");
    if (name === "cart") renderCart();
    if (name === "login") renderAuth();
  }

  function updateCartBadge() {
    const total = cart.reduce((a, c) => a + c.qty, 0);
    const badge = document.getElementById("cart-badge");
    badge.textContent = total;
    badge.style.display = total > 0 ? "flex" : "none";
  }

  function addToCart(id) {
    const p = products.find(x => x.id === id);
    const existing = cart.find(x => x.id === id);
    if (existing) { existing.qty++; } else { cart.push({ ...p, qty: 1 }); }
    updateCartBadge();
    showToast(p.name + " cart mein add hua! 🛒");
    renderProductGrid();
  }

  function removeFromCart(id) {
    cart = cart.filter(x => x.id !== id);
    updateCartBadge();
    renderCart();
    renderProductGrid();
  }

  function changeQty(id, delta) {
    const item = cart.find(x => x.id === id);
    if (!item) return;
    item.qty += delta;
    if (item.qty <= 0) removeFromCart(id);
    else { updateCartBadge(); renderCart(); }
  }

  function renderFilters() {
    const row = document.getElementById("filter-row");
    row.innerHTML = categories.map(c =>
      `<button class="filter-chip ${c === activeFilter ? 'active' : ''}" onclick="setFilter('${c}')">${c}</button>`
    ).join("");
  }

  function setFilter(cat) {
    activeFilter = cat;
    renderFilters();
    renderProductGrid();
  }

  function renderProductGrid() {
    const q = document.getElementById("search-input").value.toLowerCase();
    const filtered = products.filter(p => {
      const matchCat = activeFilter === "All" || p.category === activeFilter;
      const matchQ = p.name.toLowerCase().includes(q) || p.category.toLowerCase().includes(q);
      return matchCat && matchQ;
    });
    const grid = document.getElementById("products-grid");
    if (filtered.length === 0) {
      grid.innerHTML = `<div class="empty-state"><i class="ti ti-search-off"></i><p style="font-size:15px;font-weight:500;margin-bottom:6px">Koi product nahi mila</p><p style="font-size:13px">Alag keyword try karein</p></div>`;
      return;
    }
    const inCart = cart.map(c => c.id);
    grid.innerHTML = filtered.map(p => `
      <div class="product-card">
        <div class="product-img">${p.emoji}</div>
        <div class="product-info">
          <div class="product-name">${p.name}</div>
          <div class="product-price">₹${p.price.toLocaleString('en-IN')}</div>
          <div class="product-rating"><i class="ti ti-star-filled"></i> ${p.rating} <span>(${p.reviews})</span></div>
          ${inCart.includes(p.id)
            ? `<button class="added-btn" onclick="showTab('cart')"><i class="ti ti-check"></i> Cart mein hai</button>`
            : `<button class="add-btn" onclick="addToCart(${p.id})">Cart mein add karo</button>`}
        </div>
      </div>
    `).join("");
  }

  function renderCart() {
    const container = document.getElementById("cart-container");
    if (cart.length === 0) {
      container.innerHTML = `
        <div class="cart-empty">
          <i class="ti ti-shopping-cart" style="opacity:0.4"></i>
          <p style="font-size:16px;font-weight:600;margin-bottom:8px">Cart khaali hai</p>
          <p style="font-size:13px">Products tab mein jaake kuch add karein!</p>
          <button class="continue-btn" onclick="showTab('products')">Shopping karein</button>
        </div>`;
      return;
    }
    const subtotal = cart.reduce((a, c) => a + c.price * c.qty, 0);
    const delivery = subtotal > 999 ? 0 : 49;
    const total = subtotal + delivery;

    container.innerHTML = `
      <h3 style="font-size:18px;font-weight:600;margin-bottom:1rem">🛒 Aapki Cart (${cart.length} item)</h3>
      ${cart.map(item => `
        <div class="cart-item">
          <div class="cart-item-emoji">${item.emoji}</div>
          <div class="cart-item-details">
            <div class="cart-item-name">${item.name}</div>
            <div class="cart-item-price">₹${(item.price * item.qty).toLocaleString('en-IN')}</div>
            <div class="qty-ctrl">
              <button class="qty-btn" onclick="changeQty(${item.id}, -1)">−</button>
              <span class="qty-num">${item.qty}</span>
              <button class="qty-btn" onclick="changeQty(${item.id}, 1)">+</button>
            </div>
          </div>
          <button class="remove-btn" onclick="removeFromCart(${item.id})" title="Hatao"><i class="ti ti-trash"></i></button>
        </div>
      `).join("")}
      <div class="cart-total">
        <div class="total-row"><span>Subtotal (${cart.reduce((a,c)=>a+c.qty,0)} items)</span><span>₹${subtotal.toLocaleString('en-IN')}</span></div>
        <div class="total-row">
          <span>Delivery</span>
          <span>${delivery === 0 ? '<span class="free-delivery"><i class="ti ti-check"></i> Free</span>' : '₹' + delivery}</span>
        </div>
        ${delivery > 0 ? `<div style="font-size:12px;color:var(--text2);padding:4px 0">₹${(999-subtotal).toLocaleString('en-IN')} aur shopping pe free delivery milegi!</div>` : ''}
        <div class="total-row final"><span>Total</span><span>₹${total.toLocaleString('en-IN')}</span></div>
        <button class="checkout-btn" onclick="checkout()"><i class="ti ti-credit-card"></i> Checkout karo</button>
      </div>
    `;
  }

  function checkout() {
    if (!user) {
      showToast("Checkout ke liye pehle login karein! 👤");
      setTimeout(() => showTab('login'), 800);
      return;
    }
    cart = [];
    updateCartBadge();
    renderProductGrid();
    const container = document.getElementById("cart-container");
    container.innerHTML = `
      <div class="order-success">
        <i class="ti ti-circle-check"></i>
        <h2>Order place ho gaya! 🎉</h2>
        <p>Aapka order ${user.name} ke liye confirm ho gaya hai.<br/>3–5 business days mein deliver hoga.</p>
        <button class="continue-btn" onclick="showTab('products')">Aur shopping karein</button>
      </div>`;
  }

  function renderAuth() {
    const container = document.getElementById("auth-container");
    if (user) {
      container.innerHTML = `
        <div class="logged-in-card">
          <div class="avatar">${user.name.charAt(0).toUpperCase()}</div>
          <p style="font-size:18px;font-weight:600;margin-bottom:4px">Namaste, ${user.name}!</p>
          <p style="font-size:13px;color:var(--text2)">${user.email}</p>
          <div style="margin-top:1rem;padding:1rem;background:var(--bg3);border-radius:10px;font-size:13px">
            <div style="display:flex;justify-content:space-between;padding:4px 0">
              <span style="color:var(--text2)">Cart items</span>
              <span style="font-weight:500">${cart.length}</span>
            </div>
            <div style="display:flex;justify-content:space-between;padding:4px 0">
              <span style="color:var(--text2)">Cart value</span>
              <span style="font-weight:500;color:var(--purple)">₹${cart.reduce((a,c)=>a+c.price*c.qty,0).toLocaleString('en-IN')}</span>
            </div>
          </div>
          <button class="logout-btn" onclick="logout()"><i class="ti ti-logout"></i> Logout</button>
        </div>`;
    } else {
      container.innerHTML = `
        <div class="auth-card">
          <h2>👋 Login karein</h2>
          <p>Checkout aur order tracking ke liye login zaroori hai</p>
          <div class="form-group">
            <label>Aapka naam</label>
            <input type="text" id="auth-name" placeholder="Jaise: Rahul Kumar" />
          </div>
          <div class="form-group">
            <label>Email address</label>
            <input type="email" id="auth-email" placeholder="rahul@example.com" />
          </div>
          <div class="form-group">
            <label>Password</label>
            <input type="password" id="auth-pass" placeholder="Koi bhi password chalega" onkeydown="if(event.key==='Enter')login()" />
          </div>
          <button class="auth-btn" onclick="login()">Login / Signup</button>
          <p class="auth-note">⚠️ Ye demo app hai — koi bhi naam/email kaam karega</p>
        </div>`;
    }
  }

  function login() {
    const name = document.getElementById("auth-name").value.trim();
    const email = document.getElementById("auth-email").value.trim();
    if (!name || !email) { showToast("Naam aur email daalein!"); return; }
    if (!email.includes("@")) { showToast("Sahi email daalo!"); return; }
    user = { name, email };
    document.getElementById("user-btn").innerHTML = `<i class="ti ti-user-check" style="color:var(--purple)"></i>`;
    showToast("Welcome, " + name + "! 👋");
    renderAuth();
  }

  function logout() {
    user = null;
    document.getElementById("user-btn").innerHTML = `<i class="ti ti-user"></i>`;
    renderAuth();
    showToast("Logout ho gaye");
  }

  async function getAIRecs() {
    const container = document.getElementById("ai-recs-container");
    container.innerHTML = `<div class="ai-loading"><i class="ti ti-sparkles"></i><p>AI aapke liye best products dhundh raha hai...</p></div>`;

    const cartNames = cart.length > 0 ? cart.map(c => c.name).join(", ") : "koi bhi nahi";

    const prompt = `You are an AI shopping assistant for BazaarAI, an Indian e-commerce app.
The user's cart currently has: ${cartNames}.
Available products: ${products.map(p => `ID:${p.id} ${p.name} (₹${p.price}, ${p.category})`).join(", ")}.

Recommend exactly 3 products from the available list. Consider cart contents and pick complementary or popular items.
Respond ONLY with a raw JSON array, no markdown, no backticks:
[{"id": <number>, "reason": "<why in Hindi/Hinglish, max 12 words>"}]
Use only product IDs: ${products.map(p => p.id).join(", ")}`;

    try {
      const res = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "x-api-key": ANTHROPIC_API_KEY,
          "anthropic-version": "2023-06-01",
          "anthropic-dangerous-direct-browser-access": "true"
        },
        body: JSON.stringify({
          model: "claude-sonnet-4-6",
          max_tokens: 1000,
          messages: [{ role: "user", content: prompt }]
        })
      });

      if (!res.ok) throw new Error("API error: " + res.status);

      const data = await res.json();
      const text = data.content.map(i => i.text || "").join("");
      const clean = text.replace(/```json|```/g, "").trim();
      const recs = JSON.parse(clean);

      const inCart = cart.map(c => c.id);
      container.innerHTML = `<div class="ai-recs">` + recs.map(r => {
        const p = products.find(x => x.id === r.id);
        if (!p) return "";
        return `<div class="ai-rec-card">
          <div class="rec-badge"><i class="ti ti-sparkles"></i> AI Pick</div>
          <div class="rec-emoji">${p.emoji}</div>
          <div class="rec-name">${p.name}</div>
          <div class="rec-reason">${r.reason}</div>
          <div class="rec-price">₹${p.price.toLocaleString('en-IN')}</div>
          ${inCart.includes(p.id)
            ? `<button class="ai-add-btn" onclick="showTab('cart')"><i class="ti ti-check"></i> Cart mein hai</button>`
            : `<button class="ai-add-btn" onclick="addToCart(${p.id}); setTimeout(getAIRecs, 300)">Cart mein add karo</button>`}
        </div>`;
      }).join("") + `</div>`;

    } catch (e) {
      container.innerHTML = `
        <div class="ai-loading">
          <i class="ti ti-wifi-off" style="color:var(--text2)"></i>
          <p style="font-weight:500;margin-bottom:6px">AI se connect nahi ho saka</p>
          <p style="font-size:12px">API key check karein ya dobara try karein</p>
          <button class="get-recs-btn" onclick="getAIRecs()" style="margin:1rem auto 0">
            <i class="ti ti-refresh"></i> Dobara try karo
          </button>
        </div>`;
    }
  }

  // INIT
  renderFilters();
  renderProductGrid();
  renderCart();
  renderAuth();
</script>
</body>
</html>
